<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixelWar - Mobile Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0813;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        h1 {
            margin: 10px 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffd700, #ff5858);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dil Seçici */
        #lang-container { margin-bottom: 5px; display: flex; gap: 8px; }
        .btn-lang {
            background: #1c1730; color: #fff; border: 2px solid #39325c;
            padding: 4px 10px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .btn-lang.active-lang { background: #ffaa00; color: #000; border-color: #fff; }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background: #000;
            border: 2px solid #3d3522;
            border-radius: 8px;
            width: 95%; /* Mobilde ekrana sığması için */
            height: auto;
            max-width: 800px;
            aspect-ratio: 2 / 1;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
            touch-action: none;
        }

        /* UI Üst Bar */
        #ui-container {
            width: 95%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            visibility: hidden;
        }
        .player-info { display: flex; flex-direction: column; width: 45%; }
        .bar-container { width: 100%; height: 12px; background: #1a1625; border: 1px solid #3d3550; border-radius: 6px; margin-bottom: 3px; overflow: hidden; }
        .health-bar { height: 100%; width: 100%; background: #00ff66; transition: width 0.2s; }
        .energy-bar { height: 100%; width: 0%; background: #ffaa00; transition: width 0.2s; }
        .player-name { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* MOBİL KONTROLLER (Sadece dokunmatik cihazlarda görünür) */
        #mobile-controls {
            display: none; /* JS ile açacağız */
            width: 95%;
            margin-top: 15px;
            justify-content: space-between;
            padding-bottom: 20px;
        }
        .control-group { display: flex; gap: 10px; }
        .touch-btn {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.9); }
        .btn-action { background: rgba(255, 170, 0, 0.2); border-color: #ffaa00; }
        .btn-ulti { background: rgba(255, 0, 0, 0.2); border-color: #ff5858; width: 50px; height: 50px; font-size: 18px; }

        /* Menüler (Eski stili koruyoruz ama biraz daraltıyoruz) */
        .overlay-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 8, 20, 0.98); border: 2px solid #6b5728; border-radius: 12px;
            padding: 15px; text-align: center; z-index: 100; width: 85%; max-width: 400px;
        }
        .menu-title { font-size: 20px; margin-bottom: 15px; color: #ffaa00; font-weight: bold; }
        .btn-menu {
            background: #1f1c2c; color: white; border: 1px solid #555;
            padding: 10px; width: 100%; font-size: 14px; font-weight: bold;
            border-radius: 6px; cursor: pointer; margin-bottom: 8px;
        }
        .btn-start-fight { background: #ffaa00; color: #000; border: none; }

        /* Kostüm Seçimi Mobilde Kaydırmalı */
        .selection-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .player-select-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .costume-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .btn-costume { font-size: 10px; padding: 5px; background: #222; border: 1px solid #444; color: #ccc; border-radius: 4px; }
        .p1-selected { background: #0072ff; color: white; }
        .p2-selected { background: #9b0000; color: white; }
    </style>
</head>
<body>

    <h1>PixelWar</h1>

    <div id="lang-container">
        <button id="lang-tr" class="btn-lang active-lang" onclick="setLanguage('tr')">🇹🇷 TR</button>
        <button id="lang-en" class="btn-lang" onclick="setLanguage('en')">🇺🇸 EN</button>
    </div>

    <div id="game-wrapper">
        <div id="ui-container">
            <div id="p1-ui" class="player-info">
                <div class="player-name" style="color: #00c6ff;">P1</div>
                <div class="bar-container"><div id="p1-health" class="health-bar"></div></div>
                <div class="energy-container"><div id="p1-energy" class="energy-bar" style="width:0; height:4px; background:#ffaa00;"></div></div>
            </div>
            <div id="p2-ui" class="player-info" style="align-items: flex-end;">
                <div class="player-name" id="p2-name-label" style="color: #ff5858;">P2</div>
                <div class="bar-container"><div id="p2-health" class="health-bar"></div></div>
                <div class="energy-container"><div id="p2-energy" class="energy-bar" style="width:0; height:4px; background:#ffaa00;"></div></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="main-menu" class="overlay-screen">
            <div id="mm-title" class="menu-title">MOD SEÇİN</div>
            <button id="btn-single" class="btn-menu" onclick="selectMode('single')">Tek Oyuncu (vs BOT)</button>
            <button id="btn-multi" class="btn-menu" onclick="selectMode('multi')">İki Oyuncu (1v1)</button>
        </div>

        <div id="costume-menu" class="overlay-screen" style="display:none;">
            <div id="cm-title" class="menu-title">KOSTÜMLER</div>
            <div class="selection-container">
                <div class="player-select-box">
                    <div class="costume-options">
                        <button id="p1-c-classic" class="btn-costume p1-selected" onclick="chooseCostume(1, 'classic')">🛡️</button>
                        <button id="p1-c-monkey" class="btn-costume" onclick="chooseCostume(1, 'monkey')">🍌</button>
                        <button id="p1-c-boxer" class="btn-costume" onclick="chooseCostume(1, 'boxer')">🥊</button>
                        <button id="p1-c-bomb" class="btn-costume" onclick="chooseCostume(1, 'bomb')">💣</button>
                        <button id="p1-c-golem" class="btn-costume" onclick="chooseCostume(1, 'golem')">🪨</button>
                    </div>
                </div>
            </div>
            <button id="btn-go-stage" class="btn-menu btn-start-fight" onclick="finalizeAndStart()">BAŞLAT ⚔️</button>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display:none;">
            <div id="winner-text" class="menu-title">KAZANAN</div>
            <button class="btn-menu" onclick="location.reload()">TEKRAR DENE</button>
        </div>

        <div id="mobile-controls">
            <div class="control-group">
                <div class="touch-btn" id="btn-left">←</div>
                <div class="touch-btn" id="btn-right">→</div>
            </div>
            <div class="control-group">
                <div class="touch-btn btn-action" id="btn-hit">⚔️</div>
                <div class="touch-btn btn-action" id="btn-jump">↑</div>
                <div class="touch-btn btn-ulti" id="btn-ulti">🔥</div>
            </div>
        </div>
    </div>

    <script>
        // --- OYUN AYARLARI VE DEĞİŞKENLER (Önceki kodun aynısı, mobil destekli) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, gameOver = false, gameMode = 'single';
        let p1Costume = 'classic', p2Costume = 'classic';
        let currentLang = 'tr';

        const keys = { a: false, d: false, arrowleft: false, arrowright: false };

        // Mobil Kontrolleri Algıla
        if ('ontouchstart' in window) {
            document.getElementById('mobile-controls').style.display = 'flex';
        }

        // --- DOKUNMATİK OLAYLARI ---
        function setupTouch(id, key) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; if(key === 'w') player1Jump(); if(key === 'q') player1.attack(); if(key === 'e') player1.useUltimate(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        }
        setupTouch('btn-left', 'a');
        setupTouch('btn-right', 'd');
        setupTouch('btn-jump', 'w');
        setupTouch('btn-hit', 'q');
        setupTouch('btn-ulti', 'e');

        function player1Jump() { if(player1.velocity.y === 0) player1.velocity.y = -15; }

        // --- OYUN MANTIĞI ---
        class Player {
            constructor({ position, id, costume }) {
                this.id = id; this.position = position; this.velocity = {x:0, y:0};
                this.width = 50; this.height = 100; this.health = 100; this.energy = 0;
                this.costume = costume; this.facing = id === 1 ? 'right' : 'left';
                this.isAttacking = false; this.attackTimer = 0;
                this.baseColor = id === 1 ? '#00c6ff' : '#ff5858';
            }
            draw() {
                ctx.fillStyle = this.baseColor;
                ctx.fillRect(this.position.x, this.position.y, this.width, this.height);
                // Basit Gözler
                ctx.fillStyle = '#fff';
                let eyeX = this.facing === 'right' ? this.position.x + 30 : this.position.x + 5;
                ctx.fillRect(eyeX, this.position.y + 20, 15, 8);
            }
            update() {
                this.draw();
                this.position.x += this.velocity.x;
                this.position.y += this.velocity.y;
                if (this.position.y + this.height + this.velocity.y >= canvas.height - 20) {
                    this.velocity.y = 0; this.position.y = canvas.height - 20 - this.height;
                } else { this.velocity.y += 0.8; }
                if (this.position.x < 0) this.position.x = 0;
                if (this.position.x + this.width > canvas.width) this.position.x = canvas.width - this.width;
                if(this.isAttacking) { this.attackTimer++; if(this.attackTimer > 10) this.isAttacking = false; }
            }
            attack() { if(!this.isAttacking) { this.isAttacking = true; this.attackTimer = 0; checkHit(this); } }
            useUltimate() { if(this.energy >= 100) { this.energy = 0; updateUI(); /* Ulti Efekti */ } }
        }

        let player1, player2;

        function checkHit(attacker) {
            let target = attacker.id === 1 ? player2 : player1;
            let dist = Math.abs(attacker.position.x - target.position.x);
            if(dist < 70 && target.health > 0) {
                target.health -= 10;
                attacker.energy = Math.min(100, attacker.energy + 15);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('p1-health').style.width = player1.health + '%';
            document.getElementById('p2-health').style.width = player2.health + '%';
            document.getElementById('p1-energy').style.width = player1.energy + '%';
            document.getElementById('p2-energy').style.width = player2.energy + '%';
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333'; ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

            if(gameActive && !gameOver) {
                player1.update(); player2.update();
                player1.velocity.x = 0;
                if(keys.a) { player1.velocity.x = -6; player1.facing = 'left'; }
                else if(keys.d) { player1.velocity.x = 6; player1.facing = 'right'; }

                if(gameMode === 'single') updateAI();
                else {
                    player2.velocity.x = 0;
                    if(keys.arrowleft) { player2.velocity.x = -6; player2.facing = 'left'; }
                    else if(keys.arrowright) { player2.velocity.x = 6; player2.facing = 'right'; }
                }

                if(player1.health <= 0 || player2.health <= 0) {
                    gameOver = true;
                    document.getElementById('game-over-screen').style.display = 'block';
                    document.getElementById('winner-text').textContent = player1.health <= 0 ? "KIRMIZI KAZANDI!" : "MAVİ KAZANDI!";
                }
            }
        }

        function updateAI() {
            let dist = player1.position.x - player2.position.x;
            player2.facing = dist > 0 ? 'right' : 'left';
            if(Math.abs(dist) > 60) player2.velocity.x = dist > 0 ? 4 : -4;
            else { player2.velocity.x = 0; if(Math.random() < 0.05) player2.attack(); }
        }

        // --- MENÜ FONKSİYONLARI ---
        function selectMode(mode) { gameMode = mode; document.getElementById('main-menu').style.display = 'none'; document.getElementById('costume-menu').style.display = 'block'; }
        function chooseCostume(p, c) { p1Costume = c; }
        function finalizeAndStart() {
            document.getElementById('costume-menu').style.display = 'none';
            document.getElementById('ui-container').style.visibility = 'visible';
            player1 = new Player({ position: {x:100, y:0}, id: 1, costume: p1Costume });
            player2 = new Player({ position: {x:600, y:0}, id: 2, costume: p2Costume });
            gameActive = true;
        }

        function setLanguage(l) { currentLang = l; /* Dil değiştirme mantığı buraya */ }

        // Klavye desteği (Bilgisayar için)
        window.addEventListener('keydown', (e) => {
            if(e.key === 'a') keys.a = true; if(e.key === 'd') keys.d = true;
            if(e.key === 'w') player1Jump(); if(e.key === 'q') player1.attack();
            if(e.key === 'ArrowLeft') keys.arrowleft = true; if(e.key === 'ArrowRight') keys.arrowright = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'a') keys.a = false; if(e.key === 'd') keys.d = false;
            if(e.key === 'ArrowLeft') keys.arrowleft = false; if(e.key === 'ArrowRight') keys.arrowright = false;
        });

        animate();
    </script>
</body>
</html>
